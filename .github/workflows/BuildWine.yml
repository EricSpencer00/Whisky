name: BuildWine

# Compiles Wine from CodeWeavers' LGPL-published CrossOver source and publishes
# it as a release asset on this fork — so the community fork is no longer
# dependent on the archived upstream's CDN (data.getwhisky.app).
#
# This runs manually (workflow_dispatch) or when a tag matching wine-vX.Y.Z is
# pushed. It does NOT run on every commit — Wine compilation takes 1-3 hours.

concurrency:
  group: buildwine-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      crossover_version:
        description: "CrossOver source version (from media.codeweavers.com)"
        required: true
        default: "26.1.0"
      release_tag:
        description: "Release tag to upload to (e.g. wine-v26.1.0)"
        required: true
        default: "wine-v26.1.0"
  push:
    tags:
      - "wine-v*"

permissions:
  contents: write

env:
  # Pin upstream-source versions here so the cache keys below stay correct
  # without us having to grep build-wine.sh / fetch-*.sh. CROSSOVER_VERSION
  # honours the workflow_dispatch input override; the rest are tracked here
  # only so cache keys invalidate when we bump them in the scripts.
  CROSSOVER_VERSION: ${{ github.event.inputs.crossover_version || '26.1.0' }}
  LLVM_MINGW_VERSION: "20260407"
  MOLTENVK_VERSION: "1.4.1"
  DXVK_VERSION: "2.7.1"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v5

      - name: Cache upstream source tarballs
        # CrossOver source (~150 MB), llvm-mingw (~116 MB), MoltenVK + DXVK
        # combined are ~300 MB of cold-download every run. The fetch helpers
        # all use `if [ ! -f tarball ]; then download` so pre-populating
        # build/wine-build/ skips the curl entirely.
        uses: actions/cache@v4
        with:
          path: |
            build/wine-build/crossover-sources-*.tar.gz
            build/wine-build/llvm-mingw-*.tar.xz
            build/wine-build/MoltenVK-macos-*.tar
            build/wine-build/dxvk-*.tar.gz
          key: wine-sources-${{ env.CROSSOVER_VERSION }}-${{ env.LLVM_MINGW_VERSION }}-${{ env.MOLTENVK_VERSION }}-${{ env.DXVK_VERSION }}

      - name: Install build deps
        # Wine is built x86_64-only under Rosetta (matches upstream Whisky's
        # bundle layout). ARM64 brew at /opt/homebrew installs arm64 dylibs
        # that the Rosetta linker can't pick up. Install a parallel x86_64
        # brew at /usr/local and pull all build deps from there.
        run: |
          # ARM brew (used by tools that don't care about arch — bison/flex)
          brew update --auto-update || true
          brew install bison flex pkgconf || true

          # x86_64 brew at /usr/local for libraries linked into Wine
          if [ ! -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"' < /dev/null
          fi
          arch -x86_64 /usr/local/bin/brew update --auto-update || true
          # Note: brew renamed/bundled gst-plugins-base into the gstreamer
          # formula (all gst-* plugins now ship under one keg). And libffi is
          # NOT auto-installed by brew (glib uses macOS system libffi at link
          # time), but pkg-config refuses to emit cflags when libffi.pc is
          # absent — install it explicitly so gstreamer's pkg-config check
          # passes during Wine's configure.
          arch -x86_64 /usr/local/bin/brew install \
            ccache \
            gstreamer freetype gnutls molten-vk \
            sdl2 vulkan-headers vulkan-loader \
            zlib bzip2 libpng libffi || true

          # Sanity: confirm x86_64 dylibs are available
          file /usr/local/opt/freetype/lib/libfreetype.dylib || true
          file /usr/local/opt/gnutls/lib/libgnutls.dylib || true
          file /usr/local/opt/gstreamer/lib/libgstreamer-1.0.dylib || true

      - name: Restore ccache
        # Wine has ~10k C files; ccache makes incremental rebuilds (same
        # CrossOver source, different patches) drop from ~70 min compile to
        # ~10 min. Cache key includes commit SHA so every build saves a fresh
        # snapshot; restore-keys lets any build for the same CrossOver
        # version pull the most recent prior cache.
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: wine-ccache-${{ env.CROSSOVER_VERSION }}-${{ github.sha }}
          restore-keys: |
            wine-ccache-${{ env.CROSSOVER_VERSION }}-

      - name: Build Wine from CrossOver source
        env:
          USE_CCACHE: "1"
        run: |
          ./Scripts/build-wine.sh

      - name: ccache stats (post-build)
        if: always()
        run: ccache --show-stats || true

      - name: Compute checksum
        run: |
          shasum -a 256 out/Libraries.tar.gz | tee out/Libraries.tar.gz.sha256

      - name: Upload tarball as run artifact
        uses: actions/upload-artifact@v5
        with:
          name: Libraries-${{ env.CROSSOVER_VERSION }}
          path: |
            out/Libraries.tar.gz
            out/Libraries.tar.gz.sha256
          if-no-files-found: error

      - name: Publish release (on wine-v* tag or workflow_dispatch)
        if: startsWith(github.ref, 'refs/tags/wine-v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: |
            out/Libraries.tar.gz
            out/Libraries.tar.gz.sha256
          body: |
            Full-FOSS Wine + DXVK + MoltenVK bundle. Contents:

            - **Wine 11.0** built from CodeWeavers' LGPL-published CrossOver ${{ env.CROSSOVER_VERSION }} source, patched with **Hack 18311** (wined3d-vulkan default on macOS).
            - **MoltenVK 1.4.1** universal (x86_64 + arm64), advertising Vulkan 1.4 — enough for DXVK 2.7.1's 1.3 requirement.
            - **DXVK 2.7.1** full DLL set (d3d8, d3d9, d3d10core, d3d11, dxgi — x64 + x32).

            Sources:
            - Wine / Hack 18311 — https://media.codeweavers.com/pub/crossover/source/ (LGPL-2.1+)
            - MoltenVK — https://github.com/KhronosGroup/MoltenVK (Apache-2.0)
            - DXVK — https://github.com/doitsujin/dxvk (zlib)

            Drop-in replacement for `https://data.getwhisky.app/Wine/Libraries.tar.gz`. Point Whisky at this release via `WHISKY_WINE_BASE_URL=https://github.com/EricSpencer00/Whisky/releases/download/${{ github.ref_name }}`.
